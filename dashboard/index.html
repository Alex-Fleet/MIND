<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🐉 奶龙博士看板</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#30363d;
    --text:#e6edf3; --muted:#8b949e;
    --turn:#4493f8; --daily:#3fb950; --monthly:#bc8cff; --warn:#d29922;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font:14px/1.5 -apple-system,"PingFang SC",Segoe UI,sans-serif}
  header{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);
         padding:14px 20px;z-index:10}
  .top{display:flex;align-items:center;gap:10px}
  .title{font-size:18px;font-weight:600;display:flex;align-items:center;gap:10px}
  .title .dot{width:8px;height:8px;border-radius:50%;background:var(--daily)}
  .spacer{margin-left:auto}
  .refresh{font-size:12px;color:var(--muted);margin-right:6px}
  .btn{background:var(--panel);border:1px solid var(--border);color:var(--text);
       padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;user-select:none}
  .btn:hover{background:var(--panel2)}
  .btn.on{background:#1f6feb22;border-color:#1f6feb;color:#79c0ff}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:8px;
        padding:8px 14px;min-width:76px}
  .stat .n{font-size:20px;font-weight:700}
  .stat .l{font-size:11px;color:var(--muted)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .chip{background:var(--panel);border:1px solid var(--border);color:var(--muted);
        padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12px;user-select:none}
  .chip.on{background:#1f6feb22;border-color:#1f6feb;color:#79c0ff}
  main{max-width:1000px;margin:0 auto;padding:16px 20px 60px}
  .row{background:var(--panel);border:1px solid var(--border);border-radius:8px;
       margin-bottom:8px;padding:10px 14px;cursor:pointer;transition:background .12s}
  .row:hover{background:var(--panel2)}
  .row.noise{opacity:.5}
  .row-head{display:flex;align-items:center;gap:10px}
  .time{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px;white-space:nowrap}
  .badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;white-space:nowrap}
  .b-turn{background:#4493f822;color:var(--turn)}
  .b-daily{background:#3fb95022;color:var(--daily)}
  .b-monthly{background:#bc8cff22;color:var(--monthly)}
  .tag-noise{font-size:10px;color:var(--warn);border:1px solid var(--warn);
             padding:1px 6px;border-radius:5px;white-space:nowrap}
  .proj{font-size:11px;color:var(--muted);background:#ffffff0a;padding:2px 8px;border-radius:6px;
        white-space:nowrap;max-width:220px;overflow:hidden;text-overflow:ellipsis}
  .ttl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .body{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);
        color:#c9d1d9;white-space:pre-wrap;font-size:13px}
  .uin{background:#4493f814;border-left:3px solid var(--turn);padding:6px 10px;
       border-radius:5px;margin:0 0 8px;color:#c9d1d9;white-space:pre-wrap}
  .empty{color:var(--muted);text-align:center;padding:40px}
  .meta{margin-top:10px;color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<header>
  <div class="top">
    <div class="title"><span class="dot"></span>奶龙博士 · 记忆看板</div>
    <div class="spacer"></div>
    <span class="refresh" id="refresh">加载中…</span>
    <span class="btn" id="noiseBtn" onclick="toggleNoise()"></span>
    <span class="btn" onclick="load()">⟳ 手动刷新</span>
  </div>
  <div class="stats" id="stats"></div>
  <div class="chips" id="typeChips"></div>
  <div class="chips" id="projChips"></div>
</header>
<main><div id="list"></div></main>

<script>
const S = { data:null, proj:"all", type:"all", open:new Set(), hideNoise:true };

// 无效记录：中断 / 无实际内容 / 空操作 / compact 压缩 等
const NOISE=/(用户中断|中断，无|无实际内容|无内容|空操作|空会话|空.?会话|compact|compact命令|请求压缩|压缩空|执行压缩操作|纯粹回顾)/i;
const isNoise=it=>NOISE.test(it.title||"")||NOISE.test((it.body||"").slice(0,40));

const pad=n=>String(n).padStart(2,"0");
function fmt(iso){
  if(!iso) return "—";
  const d=new Date(iso);
  return `${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
const TYPES={turn:"turn",daily:"日报",monthly:"月报"};

async function load(){
  document.getElementById("refresh").textContent="刷新中…";
  try{
    const r=await fetch("/api/feed",{cache:"no-store"});
    S.data=await r.json();
    render();
    document.getElementById("refresh").textContent="更新于 "+fmt(new Date().toISOString());
  }catch(e){
    document.getElementById("refresh").textContent="⚠ 连不上服务器";
  }
}

function render(){
  if(!S.data) return;
  const {items,stats,projects}=S.data;
  const noiseN=items.filter(isNoise).length;

  document.getElementById("stats").innerHTML=[
    ["项目",stats.projects],["turn摘要",stats.turn],["日报",stats.daily],
    ["月报",stats.monthly],["未摘要",stats.backlog],
  ].map(([l,n])=>`<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("")
   +`<div class="stat"><div class="n" style="font-size:13px;padding-top:5px">${fmt(stats.last)}</div><div class="l">最近活动</div></div>`;

  document.getElementById("noiseBtn").className="btn"+(S.hideNoise?" on":"");
  document.getElementById("noiseBtn").textContent=(S.hideNoise?"🙈 已隐藏无效":"👁 显示无效")+` (${noiseN})`;

  const tc=[["all","全部"],["turn","turn"],["daily","日报"],["monthly","月报"]];
  document.getElementById("typeChips").innerHTML=tc.map(([k,l])=>
    `<span class="chip ${S.type===k?"on":""}" onclick="setType('${k}')">${l}</span>`).join("");

  document.getElementById("projChips").innerHTML=
    `<span class="chip ${S.proj==="all"?"on":""}" onclick="setProj('all')">全部项目</span>`+
    projects.map(p=>`<span class="chip ${S.proj===p.slug?"on":""}" onclick="setProj('${p.slug}')" title="${p.slug}">${p.name}</span>`).join("");

  const rows=items.filter(it=>
    (S.proj==="all"||it.project===S.proj)&&
    (S.type==="all"||it.type===S.type)&&
    !(S.hideNoise&&isNoise(it)));
  const list=document.getElementById("list");
  if(!rows.length){list.innerHTML=`<div class="empty">没有匹配的记录</div>`;return;}
  list.innerHTML=rows.map(it=>{
    const key=(it.file||"")+it.ts+it.title;
    const open=S.open.has(key), noise=isNoise(it);
    return `<div class="row ${noise?"noise":""}" onclick="toggle('${key.replace(/'/g,"")}')">
      <div class="row-head">
        <span class="time">${fmt(it.ts)}</span>
        <span class="badge b-${it.type}">${TYPES[it.type]}</span>
        ${noise?'<span class="tag-noise">无效</span>':""}
        <span class="proj" title="${it.project}">${it.project_name}</span>
        <span class="ttl">${esc(it.title)}</span>
      </div>${open?`<div class="body">${it.user_input?`<div class="uin"><b>👤 用户</b>　${esc(it.user_input)}</div>`:""}${it.type==="turn"?"<b>📝 摘要</b>　":""}${esc(it.body||"")}${it.summarized_at?`<div class="meta">🕒 对话 ${fmt(it.ts)}　·　总结于 ${fmt(it.summarized_at)}</div>`:""}</div>`:""}</div>`;
  }).join("");
}
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
window.toggle=k=>{S.open.has(k)?S.open.delete(k):S.open.add(k);render();};
window.setProj=p=>{S.proj=p;render();};
window.setType=t=>{S.type=t;render();};
window.toggleNoise=()=>{S.hideNoise=!S.hideNoise;render();};

load();
setInterval(load,12000);
</script>
</body>
</html>
